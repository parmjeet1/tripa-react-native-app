<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#006481",
                      "on-primary-container": "#fbfdff",
                      "tertiary-fixed-dim": "#ffb95f",
                      "secondary-container": "#ade1fe",
                      "primary-fixed": "#bee9ff",
                      "surface-container": "#ffffff",
                      "on-primary-fixed": "#001f2a",
                      "on-secondary": "#ffffff",
                      "error": "#ba1a1a",
                      "success": "#22c55e",
                      "on-tertiary-fixed-variant": "#653e00",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-highest": "#d3e4fe",
                      "surface-container-high": "#dce9ff",
                      "surface-variant": "#d3e4fe",
                      "on-background": "#0b1c30",
                      "inverse-primary": "#71d2fd",
                      "error-container": "#ffdad6",
                      "fixed-badge": "#e0f2fe",
                      "surface-bright": "#f8f9ff",
                      "on-tertiary": "#ffffff",
                      "on-primary-fixed-variant": "#004d65",
                      "on-tertiary-container": "#fffbff",
                      "secondary-fixed": "#c1e8ff",
                      "on-surface": "#0b1c30",
                      "tertiary-fixed": "#ffddb8",
                      "tertiary": "#825100",
                      "on-secondary-fixed-variant": "#0f4c64",
                      "on-surface-variant": "#3e484e",
                      "surface-tint": "#006685",
                      "secondary-fixed-dim": "#9acdea",
                      "outline": "#6e797f",
                      "on-secondary-fixed": "#001e2b",
                      "secondary": "#2f647d",
                      "inverse-surface": "#213145",
                      "primary-container": "#007ea3",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "background": "#f8f9ff",
                      "inverse-on-surface": "#eaf1ff",
                      "tertiary-container": "#a36700",
                      "on-error": "#ffffff",
                      "surface": "#f8fafc",
                      "primary-fixed-dim": "#71d2fd",
                      "on-tertiary-fixed": "#2a1700",
                      "negotiable-badge": "#fef3c7",
                      "surface-container-low": "#eff4ff",
                      "outline-variant": "#bec8cf",
                      "surface-dim": "#cbdbf5",
                      "on-secondary-container": "#30657e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-margin": "16px",
                      "gutter": "12px",
                      "sm": "8px",
                      "xs": "4px",
                      "xl": "32px",
                      "md": "16px",
                      "base": "8px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "title-md": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "title-lg": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "label-lg": ["Plus Jakarta Sans"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "display-lg": ["Plus Jakarta Sans"],
                      "label-md": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "title-md": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface dark:bg-surface-dim">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="directions_car">directions_car</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">RideConnect</h1>
</div>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high p-2 rounded-full transition-colors" data-icon="account_circle">account_circle</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 pb-20 px-container-margin max-w-[600px] mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-xl">
<div class="flex justify-between items-center mb-sm">
<span class="font-label-lg text-label-lg text-primary uppercase tracking-wider">Step 1 of 3</span>
<span class="font-label-md text-label-md text-on-surface-variant">33% Complete</span>
</div>
<div class="h-2 w-full bg-secondary-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full transition-all duration-700 ease-out shadow-sm"></div>
</div>
</div>
<!-- Form Section -->
<section class="space-y-lg">
<div class="space-y-xs">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Driver Information</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please provide your official vehicle and contact details to proceed.</p>
</div>
<!-- Bento-style Form Container -->
<div class="glass-card rounded-xl p-md shadow-sm space-y-md">
<!-- Driver Name Field -->
<div class="space-y-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="person">person</span>
                        Driver Full Name
                    </label>
<input class="w-full h-14 px-md bg-surface border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-lg text-body-lg" placeholder="e.g. Johnathan Smith" required="" type="text"/>
</div>
<!-- Mobile Number Field -->
<div class="space-y-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="smartphone">smartphone</span>
                        Mobile Number
                    </label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-body-lg text-on-surface-variant border-r border-outline-variant pr-md">+1</span>
<input class="w-full h-14 pl-16 pr-md bg-surface border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-lg text-body-lg" placeholder="(555) 000-0000" required="" type="tel"/>
</div>
</div>
<!-- Vehicle Number Field -->
<div class="space-y-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="license">license</span>
                        Vehicle Number
                    </label>
<input class="w-full h-14 px-md bg-surface border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-lg text-body-lg uppercase" placeholder="e.g. ABC-1234" required="" type="text"/>
</div>
</div>
<!-- Visual Context Illustration -->
<div class="relative rounded-xl overflow-hidden h-48 group">
<img alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" data-alt="A high-end, professionally photographed scene of a clean, modern white sedan parked in a sunlit urban business district. The lighting is bright and warm, emphasizing a modern corporate travel aesthetic. A person in professional casual attire is visible from behind, opening the driver side door, symbolizing the beginning of a journey. The color palette is composed of soft blues, crisp whites, and deep slate tones, aligning with the RideConnect brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBva-YPMvRegKVY3k-N_U4QeKNlFnahkrJt9fd5Dw7tYb9b_VykftpzG3eQx-51S8lJUx_z87jUVKQRZwnE8yQf4tbDd6mJKrZ1ppHiETDuaeINdYmcUAfSh7YO8KgUn-EidK_O61fmOHwPoyCGUiAGd-H5lON5wBA6puPGeN38AjKi90v1MQ8ighqq93oUczkco_EDTw-iVycgVRP9P_a-ybV2Lk8dN21Mg4sqlGvsHC81CoWyopbNVoq0SF3B5UmCXp89MTdvjhg"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-md">
<p class="text-white font-label-lg text-label-lg opacity-90">Verify your details to ensure passenger trust.</p>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-primary text-on-primary font-title-lg text-title-lg rounded-lg shadow-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
                Next
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-surface dark:bg-surface-container px-container-margin pb-safe border-t border-outline-variant dark:border-outline shadow-md rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1 hover:bg-surface-container-highest dark:hover:bg-surface-variant transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-label-md text-label-md">Search Ride</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-4 py-1 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-md text-label-md">Publish Ride</span>
</a>
</nav>
<script>
        // Micro-interactions for form focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('text-primary');
            });
        });
    </script>
</body></html>
