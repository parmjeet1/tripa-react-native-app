<script>
        // Simple confetti effect on load
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#006481', '#22c55e', '#ade1fe', '#ffddb8'];
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti-particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.borderRadius = i % 2 === 0 ? '50%' : '2px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 15;
                const tx = Math.cos(angle) * (50 + Math.random() * 150);
                const ty = Math.sin(angle) * (50 + Math.random() * 150);
                
                container.appendChild(particle);

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    delay: 200,
                    fill: 'forwards'
                });
            }
        });

        // Toggle Dark Mode (Optional utility for demo)
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
